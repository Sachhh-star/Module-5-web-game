<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/tafelgame.css" />
    <title>Tafel Toren Game</title>
  </head>
  <body>
    <div class="game-container">
      <!-- start Screen -->
      <div id="start-screen" class="screen active">
        <h1 class="logo">Times Table Tower</h1>
        <p>Test your math skills up to level 10!</p>
        <button id="start-btn" class="main-btn">Start Game</button>
      </div>

      <!-- game Screen -->
      <div id="game-screen" class="screen hidden">
        <button id="back-btn" class="icon-btn">⬅ Back</button>
        <div class="hud">
          <div class="level-badge">Level <span id="level-display">1</span></div>
          <div class="lives-badge"><span id="lives-display">❤️❤️❤️</span></div>
          <div class="score-badge">
            Score: <span id="score-display">0</span>
          </div>
        </div>

        <div class="timer-container">
          <div class="timer-text">
            Time: <span id="timer-display">30</span>s
          </div>
          <div class="timer-bar-bg">
            <div id="timer-bar" class="timer-bar"></div>
          </div>
        </div>

        <div class="question-container">
          <h2 id="question-text">3 × 4 = ?</h2>
        </div>

        <div class="answers-grid" id="answers-container">
          <button class="answer-btn"></button>
          <button class="answer-btn"></button>
          <button class="answer-btn"></button>
          <button class="answer-btn"></button>
        </div>

        <div id="feedback-msg" class="feedback">Good job!</div>
      </div>

      <!-- end Screen -->
      <div id="end-screen" class="screen hidden">
        <h1 id="end-title" class="logo">Awesome!</h1>
        <p id="end-message">You have conquered the Times Table Tower!</p>
        <p class="final-score">
          Final Score: <span id="final-score-display">0</span>
        </p>
        <button id="restart-btn" class="main-btn">Play Again</button>
        <button id="menu-btn" class="secondary-btn">Main Menu</button>
      </div>
    </div>

    <script src="/javascript/tafelgame.js"></script>
  </body>
</html>
