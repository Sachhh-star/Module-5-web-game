<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/tafelgame.css" />
    <title>Tafel Toren Game</title>
  </head>
  <body>
    <div class="game-container">
      <!-- start screen -->
      <div id="start-screen" class="screen-active">
        <h1 class="title">Tafel toren</h1>
        <p>Quick Math Game</p>
        <button id="start-btn" class="main-btn">Start Game</button>
      </div>

      <!-- game screen -->
      <div id="game-screen" class="screen-hidden">
        <button is="back-btn" class="icon-back">⬅ Back</button>
        <!-- status -->
        <div class="status">
          <div class="level-status">
            Level <span id="level-display">1</span>
          </div>
          <div class="lives-status"><span id="lives-display"></span>❤️❤️❤️</div>
          <div class="score-status">
            Score: <span id="score-status">0</span>
          </div>
        </div>

        <!-- timer -->
        <div class="timer-container">
          <div class="timer=text">
            Time: <span id="timer-display">30</span>s
          </div>
          <div class="timer=bar-bg">
            <div id="timer-bar" class="timer-bar"></div>
          </div>
        </div>

        <!-- question -->
        <div class="question-container">
          <h2 id="question-text">3 × 4 = ?</h2>
        </div>

        <div class="answer-grid" id="answer-container">
          <!-- js -->
        </div>
        <!-- feedback-msg -->
        <div id="feedback-msg" class="feedback">You're doing great!</div>
      </div>

      <!-- end screen -->
       <div id="end-screen" class="screen-hidden">
        <h1 id="end-title" class="title">Great!</h1>
        <p id="end-message">You lose!</p>
        <p id="final-score">Final Score: <span id="final-score-display">0</span></p>
        <button id="restart-btn" class="main-btn">Try again!</button>
        <button id="menu-btn" class="secondary-btn">Head menu</button>
       </div>
    </div>

    <script src="/javascript/tafelgame.js"></script>
  </body>
</html>
