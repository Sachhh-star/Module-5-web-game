<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/mathgame.css" />
    <title>math game</title>
  </head>
  <body>
    <div class="floating-math">
      <span class="symbol plus">+</span>
      <span class="symbol minus">−</span>
      <span class="symbol times">×</span>
      <span class="symbol divide">÷</span>
    </div>
    <div id="game-container">
      <div id="start-screen">
        <h1>Math Game</h1>
        <button id="start-btn" class="start-mathgameBTN">Start Game</button>
        <br />
        <button
          onclick="window.location.href = 'index.html'"
          class="start-mathgameBTN"
        >
          Back to menu
        </button>
      </div>
      <div id="main-game" class="maingameArea" style="display: none">
        <div id="status" class="status-container">
          <p>Level <span id="display-level">1</span></p>
          <p>Score <span id="display-score">0</span></p>
        </div>
        <div id="game-area">
          <span id="num1"></span>
          <span id="operator"></span>
          <span id="num2"></span>
          <span>=</span>
          <span id="result"></span>
        </div>
        <div id="display-answers" class="answerDisplay">
          <input type="number" id="answer-input" placeholder="Your answer" />
          <button id="submit-btn">Submit</button>
          <div id="feedback-msg"></div>
        </div>
        <div id="display-timer">
          <p>Time: <span id="timer">00:30</span></p>
        </div>
        <div id="display-back">
          <button id="back-btn">Back to Menu</button>
          <button id="reset-btn">Reset Game</button>
          <div id="resetbtn-message" style="margin-top: 15px; text-align: center;">
          </div>
        </div>
      </div>
    </div>
    <script src="../javascript/mathgame.js"></script>
    <script>
      document
        .getElementById("start-btn")
        .addEventListener("click", function () {
          document.getElementById("main-game").style.display = "block";
        });
      document
        .getElementById("back-btn")
        .addEventListener("click", function () {
          window.location.href = "index.html";
        });
    </script>
  </body>
</html>
